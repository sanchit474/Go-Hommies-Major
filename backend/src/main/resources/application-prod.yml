spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:540000}
      keepalive-time: ${DB_KEEPALIVE_TIME_MS:300000}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false

  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: never

jwt:
  expiration:
    ms: ${JWT_EXPIRATION_MS:36000000}
  secret:
    key: ${JWT_SECRET_KEY}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}

management:
  health:
    mail:
      enabled: false

resend:
  api-key: ${RESEND_API_KEY}
  from-email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}