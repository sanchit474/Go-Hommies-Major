spring:
  application:
    name: GoHommies
  profiles:
    active: dev
  jpa:
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

server:
  servlet:
    context-path: /api

jwt:
  expiration:
    ms: 36000000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
