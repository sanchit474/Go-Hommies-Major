spring:
  application:
    name: GoHommies
  profiles:
    active: prod
  jpa:
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

jwt:
  expiration:
    ms: 36000000
  secret:
    key: ${JWT_SECRET_KEY:dev-only-change-this-jwt-secret-key-minimum-32-bytes}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
