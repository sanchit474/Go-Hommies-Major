name: Deploy Backend to Render

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-render.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Build with Maven
        working-directory: backend
        run: mvn clean package -DskipTests -q
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: jar-artifact
          path: backend/target/*.jar
          retention-days: 1
  
  test:
    runs-on: ubuntu-latest
    needs: build
    
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: GoHommiesDB
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run tests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/GoHommiesDB
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: mvn test -q

  deploy:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: success()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK not configured"
            echo "Set up automatic deployment:"
            echo "1. Go to Render dashboard → Service Settings"
            echo "2. Copy Deploy Hook URL"
            echo "3. Add as GitHub secret: RENDER_DEPLOY_HOOK"
            exit 0
          fi
          
          echo "🚀 Triggering Render deployment..."
          curl --fail -X POST "$RENDER_DEPLOY_HOOK"
          echo "✅ Deployment triggered"
      
      - name: Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Backend Deployment: ${{ job.status }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
